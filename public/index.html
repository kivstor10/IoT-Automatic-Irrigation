<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphing App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <div class="graph_container">
        <canvas id="CO2_Graph_Canvas" role="img"></canvas>
    </div>
    <div class="graph_container">
        <canvas id="ParticulateMatter_Graph_Canvas" role="img"></canvas>
    </div>
    <div class="graph_container">
        <canvas id="Humidity_Graph_Canvas" role="img"></canvas>
    </div>
    <div class="graph_container">
        <canvas id="CO_Graph_Canvas" role="img"></canvas>
    </div>
    <div class="graph_container">
        <canvas id="Temperature_Graph_Canvas" role="img"></canvas>
    </div>

    <script src="/scripts/index.js" defer></script>
</body>
</html>
